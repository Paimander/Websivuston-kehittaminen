<!DOCTYPE html>

<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WS04 Page Layout</title>
</head>

<body>

    <header>
        <h1>WS04 Page Layout</h1>
        <nav>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="about">
            <h2>About Me</h2>
            <p>Testi testi testi.</p>
        </section>

        <section id="grid-container">
            <h2>Grid Container</h2>
            <div class="grid-container">
                <div class="grid-item">Peruna</div>
                <div class="grid-item">Porkkana</div>
                <div class="grid-item">Riisi</div>
                <div class="grid-item">Sipuli</div>
                <div class="grid-item">Tomaatti</div>
                <div class="grid-item">Parsakaali</div>
            </div>
        </section>

        <section id="flex-container">
            <h2>Flex Container</h2>
            <div class="flex-container">
                <div class="box">Box 1</div>
                <div class="box">Box 2</div>
                <div class="box">Box 3</div>
            </div>
        </section>

        <section id="responsive-box">
            <h2>Responsive Box</h2>
            <div class="responsive-box">Resize the window to see the effect</div>
        </section>

    </main>

    <footer>
        <p>Copyright 2025</p>
    </footer>


</body>

</html>
